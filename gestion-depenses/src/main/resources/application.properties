# ============================================================
# Configuration de la base de données MySQL
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/gestion_depenses?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# Configuration JPA/Hibernate
# ============================================================
# Crée ou met à jour la base de données automatiquement
spring.jpa.hibernate.ddl-auto=update
# Affiche les requêtes SQL dans la console
spring.jpa.show-sql=true
# Formate les requêtes SQL pour une meilleure lisibilité
spring.jpa.properties.hibernate.format_sql=true
# Affiche les paramètres des requêtes SQL
spring.jpa.properties.hibernate.use_sql_comments=true
# Dialecte Hibernate pour MySQL 8
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ============================================================
# Configuration de l'application
# ============================================================
# Nom de l'application
spring.application.name=Gestion des Dépenses Personnelles
# Port du serveur
server.port=8080
# Niveau de logging
logging.level.root=INFO
logging.level.com.exemple.depenses=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ============================================================
# Configuration JWT
# ============================================================
# Clé secrète pour signer les JWT (À changer en production!)
jwt.secret=maSuperClePourSignerLesJWTTresSecuriseeEtTresLongueEnProduction123456789!@#
# Temps d'expiration du token en millisecondes (24 heures)
jwt.expiration=86400000

# ============================================================
# Configuration Jackson (Sérialisation/Désérialisation JSON)
# ============================================================
# Format de la date en JSON
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
